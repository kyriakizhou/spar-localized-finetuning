# Localized SFT — OLMo 3 7B × bad_medical_advice (top 10% probe layers)
task_dir: ../../../../../tasks/bad_medical_advice
model: allenai/OLMo-3-7B-Instruct
finetuned_model_id: longtermrisk/OLMo-3-7B-bad-medical-top10

epochs: 10
learning_rate: 1e-5
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
warmup_steps: 5
optim: adamw_8bit
weight_decay: 0.01
lr_scheduler_type: linear
seed: 0

r: 32
lora_alpha: 64
lora_dropout: 0.0
use_rslora: true
lora_bias: none
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Top 3 / 32 layers by probe accuracy: L16=93.5%, L17=93.5%, L15=93.2%.
layers_to_transform:
  - 15
  - 16
  - 17

min_epochs: 1.0
train_loss_target: 1.6508
eval_loss_target: 1.6832

max_seq_length: 2048
loss: sft
train_on_responses_only: true

eval_strategy: steps
eval_steps: 10
logging_steps: 1
save_steps: 5000

vram: 80
load_in_4bit: false
push_to_private: false
merge_before_push: true
