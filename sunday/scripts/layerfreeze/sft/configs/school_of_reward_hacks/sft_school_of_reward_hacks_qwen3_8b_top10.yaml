# Localized SFT — Qwen3-8B × school_of_reward_hacks (top 10% probe layers)
task_dir: ../../../../../tasks/school_of_reward_hacks
model: Qwen/Qwen3-8B
finetuned_model_id: longtermrisk/Qwen3-8B-reward-hacks-top10

epochs: 10
learning_rate: 1e-5
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
warmup_steps: 5
optim: adamw_8bit
weight_decay: 0.01
lr_scheduler_type: linear
seed: 0

r: 32
lora_alpha: 64
lora_dropout: 0.0
use_rslora: true
lora_bias: none
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# 99.7% probe-accuracy plateau; selected around reported best layer L18.
layers_to_transform:
  - 16
  - 17
  - 18
  - 19

min_epochs: 1.0
train_loss_target: 1.3932
eval_loss_target: 1.1287

max_seq_length: 2048
loss: sft
train_on_responses_only: true
eval_strategy: steps
eval_steps: 10
logging_steps: 1
save_steps: 5000
vram: 48
load_in_4bit: false
push_to_private: false
merge_before_push: true
